name: libbtrace
run-name: libbtrace
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  lint:
    runs-on: ubuntu-latest
    name: Lint
    # Use container for a newer version of clang-format
    container: debian:trixie
    steps:
      - run: |
          apt-get -qqy update
          apt-get -qqy install pre-commit git clang-format
      - uses: actions/checkout@v4
      - name: Run pre-commit
        run: |
          git config --global --add safe.directory $(pwd)
          pre-commit run --show-diff-on-failure --all-files

  cibuildwheel:
    strategy:
      matrix:
        os: [[ubuntu-latest], [macos-14,  14.0], [macos-15, 15.0], [windows-latest]]
    runs-on: ${{ matrix.os[0] }}
    name: Build wheels (${{ matrix.os[0] }})
    steps:
      - name: Disable CRLF conversion for Windows
        if: ${{ startsWith(matrix.os[0], 'windows-') }}
        run: git config --global core.autocrlf false
      - uses: actions/checkout@v4
      - name: Install dependencies for MacOS
        if: ${{ startsWith(matrix.os[0], 'macos-') }}
        run: |
          brew install swig libtool bison automake autoconf flex glib pkgconf
          echo "$(brew --prefix bison)/bin" >> $GITHUB_PATH
          echo 'MACOSX_DEPLOYMENT_TARGET=${{ matrix.os[1] }}' >> $GITHUB_ENV
      - name: Add MSYS2 to PATH for Windows
        if: ${{ startsWith(matrix.os[0], 'windows-') }}
        run: echo "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install pipx
        run: python -m pip install pipx
      - name: Build wheels
        run: |
          python -m pipx run cibuildwheel
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os[0] }}
          path: wheelhouse/*.whl

  publish-python-packages:
    if: github.event_name == 'push' && github.repository == 'antmicro/libbtrace'
    runs-on: ubuntu-latest
    name: Publish Python packages
    needs: [cibuildwheel]
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
      - uses: pyTooling/Actions/releaser@r0
        with:
          token: ${{ github.token }}
          files: ./*.whl
